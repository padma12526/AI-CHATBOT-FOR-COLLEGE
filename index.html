<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AskSU AI Chatbot</title>

  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <div class="chatbot-container">

    <div class="chatbot-header">

      <div class="header-top">

        <div>

          <h1>AskSU AI</h1>

          <p>Srinath University Student Help Assistant</p>

        </div>

        <select id="languageSelect">

          <option value="en">EN</option>

          <option value="hi">HI</option>

          <option value="bn">BN</option>

        </select>

      </div>

    </div>

    <div class="chat-box" id="chatBox">

      <div class="bot-message">

Hello! I am AskSU AI.
Ask me about admission, courses, fees, departments, exams, placements, scholarships, hostel, transport, library and facilities.

      </div>

    </div>

    <div class="input-area">

      <button class="voice-btn" onclick="startVoiceInput()">
        🎤
      </button>

      <input
        type="text"
        id="userInput"
        placeholder="Ask something about Srinath University..."
      >

      <button onclick="sendMessage()">
        Ask
      </button>

    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
